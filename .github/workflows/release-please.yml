name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

      # If a release was created, we check out the code to update the major tag
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Update major tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          # Force create the major version tag (e.g., v1, v2) pointing to the current commit
          git tag -fa v${{ steps.release.outputs.major }} -m "Release v${{ steps.release.outputs.major }}"

          # Force push the tag
          git push origin v${{ steps.release.outputs.major }} --force
